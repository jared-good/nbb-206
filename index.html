<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NBA 終極上帝模式</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #000; color: #fff; padding: 10px; margin: 0; transition: border 0.3s; border: 2px solid #000; height: 100vh; box-sizing: border-box; overflow-y: auto; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; position: relative; }
        .card-gold { border: 1px solid #f39c12; box-shadow: 0 0 12px rgba(243,156,18,0.15); }
        h2 { color: #f39c12; margin: 0 0 10px 0; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
        .bankroll { font-size: 26px; font-weight: bold; color: #2ecc71; text-align: center; margin: 5px 0; }
        .report-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab { flex: 1; padding: 10px; background: #262626; border-radius: 6px; text-align: center; font-size: 13px; color: #888; cursor: pointer; border: 1px solid #333; }
        .tab.active { background: #f39c12; color: #000; font-weight: bold; border: none; }
        .unit-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 10px; }
        .u-tab { padding: 8px 0; background: #262626; border-radius: 5px; text-align: center; font-size: 12px; color: #888; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .u-tab.active { background: #f39c12; color: #000; font-weight: bold; border: none; }
        .u-gold { border-color: #f1c40f; color: #f1c40f; box-shadow: 0 0 5px rgba(241,196,15,0.3); }
        .disabled { opacity: 0.2; pointer-events: none; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; text-align: center; }
        .stat-box { background: #222; padding: 8px; border-radius: 8px; border: 1px solid #333; }
        .stat-label { font-size: 11px; color: #888; margin-bottom: 3px; }
        .stat-num { font-size: 17px; font-weight: bold; color: #f39c12; }
        .date-display { font-size: 13px; color: #f39c12; margin-bottom: 8px; font-weight: bold; text-align: center; display: flex; justify-content: center; gap: 10px; align-items: center; }
        .streak-badge { font-size: 12px; padding: 2px 8px; border-radius: 12px; background: #333; }
        .progress-bg { background: #333; border-radius: 8px; height: 14px; overflow: hidden; margin-top: 8px; border: 1px solid #444; }
        .progress-fill { background: linear-gradient(90deg, #f39c12, #f1c40f); height: 100%; width: 0%; transition: 0.5s; }
        input, select, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: #262626; color: #fff; border: 1px solid #444; }
        button { background: #f39c12; color: #000; font-weight: bold; }
        table { width: 100%; margin-top: 12px; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #888; padding-bottom: 5px; border-bottom: 1px solid #333; }
        td { padding: 10px 4px; border-bottom: 1px solid #222; }
        .win { color: #2ecc71; } .lose { color: #e74c3c; }
        .del-btn { color: #e74c3c; background: none; border: none; font-size: 18px; cursor: pointer; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-small { background: #34495e; color: #eee; font-size: 12px; flex: 1; padding: 10px; }
        .tilt-warning { display: none; color: #e74c3c; font-size: 12px; text-align: center; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>💰 真實資金庫 <button onclick="setBase()" style="width:auto;padding:4px 8px;font-size:11px;margin:0;background:#444;color:#fff;">設定本金</button></h2>
        <div class="bankroll" id="bankrollDisplay">0.0 u</div>
    </div>

    <div class="card card-gold">
        <h2>🎯 本週 300u 目標進度 <span id="weekProgressText" style="color:#fff; font-size:14px; font-weight:normal;">0.0 / 300u</span></h2>
        <div class="progress-bg"><div class="progress-fill" id="weekBar"></div></div>
    </div>

    <div class="card">
        <div class="report-tabs">
            <div class="tab active" onclick="setMode('day', this)">日報</div>
            <div class="tab" onclick="setMode('week', this)">週報</div>
            <div class="tab" onclick="setMode('month', this)">月報</div>
        </div>
        <div class="date-display"><span id="dateRange">---</span> <span id="streakBadge" class="streak-badge"></span></div>
        <div class="stat-grid">
            <div class="stat-box"><div class="stat-label">勝場</div><div id="winCount" class="stat-num">0</div></div>
            <div class="stat-box"><div class="stat-label">勝率</div><div id="winRate" class="stat-num">0%</div></div>
            <div class="stat-box"><div class="stat-label">區間損益</div><div id="total" class="stat-num">0</div></div>
        </div>
    </div>

    <div class="card">
        <h2>✍️ 快速記錄 (賠率 1.88)</h2>
        <div id="tiltMsg" class="tilt-warning">⚠️ 偵測到連黑！高風險注額已強制鎖定，請冷靜！</div>
        <div class="unit-grid" id="uGrid">
            <div class="u-tab u-gold active" id="u15" onclick="setUnit(15, this)">🌟 15u</div>
            <div class="u-tab" onclick="setUnit(20, this)">20u</div>
            <div class="u-tab" onclick="setUnit(30, this)">30u</div>
            <div class="u-tab" onclick="setUnit(40, this)">40u</div>
            <div class="u-tab risk" onclick="setUnit(50, this)">50u</div>
            <div class="u-tab risk" onclick="setUnit(60, this)">60u</div>
            <div class="u-tab risk" onclick="setUnit(70, this)">70u</div>
            <div class="u-tab risk" onclick="setUnit(80, this)">80u</div>
            <div class="u-tab risk" onclick="setUnit(90, this)">90u</div>
            <div class="u-tab risk" onclick="setUnit(100, this)">100u</div>
        </div>
        <input type="text" id="name" placeholder="賽事名稱">
        <select id="res">
            <option id="opt-win" value="14.1">勝 (+14.1u)</option>
            <option id="opt-lose" value="-15">負 (-15u)</option>
            <option value="0">走 (0u)</option>
        </select>
        <button onclick="save()">💾 保存結果</button>
        <div class="btn-group">
            <button class="btn-small" onclick="importData()">⬇️ 導入 AI 清單</button>
            <button class="btn-small" onclick="exportData()" style="background:#27ae60;">⬆️ 備份數據</button>
        </div>
    </div>

    <div class="card">
        <h2>📋 歷史清單</h2>
        <table>
            <thead><tr><th>日期</th><th>賽事</th><th>結果</th><th>損益</th><th></th></tr></thead>
            <tbody id="list"></tbody>
        </table>
        <button onclick="if(confirm('重置所有數據？')){localStorage.clear();location.reload();}" style="background:transparent;color:#555;font-size:11px;margin-top:15px;width:auto;padding:5px;">🗑️ 全部重置</button>
    </div>

    <script>
        let logs = JSON.parse(localStorage.getItem('nba_god_mode')) || [];
        let baseMoney = parseFloat(localStorage.getItem('nba_base')) || 0;
        let currentMode = 'day', currentUnit = 15;

        function setBase() {
            let m = prompt("請輸入目前的真實總本金 (例如 1409):", baseMoney);
            if(m !== null && !isNaN(m)) { baseMoney = parseFloat(m); localStorage.setItem('nba_base', baseMoney); render(); }
        }

        function setUnit(u, el) {
            currentUnit = u;
            document.querySelectorAll('.u-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            const winP = (u * 0.88).toFixed(1);
            document.getElementById('opt-win').value = winP;
            document.getElementById('opt-win').innerText = `勝 (+${winP}u)`;
            document.getElementById('opt-lose').value = -u;
            document.getElementById('opt-lose').innerText = `負 (-${u}u)`;
        }

        function getWeek(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(),0,1))) / 86400000) + 1)/7);
        }

        function getMonday(d) {
            d = new Date(d);
            var day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6:1);
            return new Date(d.setDate(diff));
        }

        function setMode(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function render() {
            let t = 0, win = 0, g = 0, allTimeProfit = 0, weekProfit = 0; 
            let cWin = 0, cLose = 0;
            const now = new Date(); 
            const thisMonday = getMonday(now);
            thisMonday.setHours(0,0,0,0);
            
            const tbody = document.getElementById('list');
            tbody.innerHTML = '';

            // 計算連勝/連黑、總損益、與「本週」嚴格損益
            for(let i=0; i<logs.length; i++) {
                let logDate = new Date(logs[i].date);
                allTimeProfit += logs[i].p;
                
                // 獨立計算本週 (週一到週日)
                if(logDate >= thisMonday) {
                    weekProfit += logs[i].p;
                }

                if(logs[i].p === 0) continue;
                if(logs[i].p > 0) { if(cLose===0) cWin++; else break; }
                else if(logs[i].p < 0) { if(cWin===0) cLose++; else break; }
            }

            // 防護網機制
            const risks = document.querySelectorAll('.risk');
            const body = document.body;
            const tiltMsg = document.getElementById('tiltMsg');
            if(cLose >= 3) {
                body.style.borderColor = "#e74c3c";
                tiltMsg.style.display = "block";
                risks.forEach(r => r.classList.add('disabled'));
                if(currentUnit >= 50) setUnit(15, document.getElementById('u15'));
            } else {
                body.style.borderColor = "#000";
                tiltMsg.style.display = "none";
                risks.forEach(r => r.classList.remove('disabled'));
            }

            // 雷達徽章
            const badge = document.getElementById('streakBadge');
            if(cWin >= 2) badge.innerHTML = `🔥 ${cWin} 連勝`;
            else if(cLose >= 2) badge.innerHTML = `❄️ ${cLose} 連黑`;
            else badge.innerHTML = ``;

            // 資金庫更新
            document.getElementById('bankrollDisplay').innerText = (baseMoney + allTimeProfit).toFixed(1) + ' u';

            // 更新獨立的每週 300u 進度條
            document.getElementById('weekProgressText').innerText = weekProfit.toFixed(1) + ' / 300u';
            document.getElementById('weekBar').style.width = Math.min(Math.max(0, (weekProfit/300)*100), 100) + '%';

            // 報表區間計算 (配合下方日/週/月切換)
            const dateEl = document.getElementById('dateRange');
            if(currentMode==='day') dateEl.innerText = `${now.getMonth()+1}/${now.getDate()} (今日)`;
            else if(currentMode==='week') dateEl.innerText = `第 ${getWeek(now)} 週戰報`;
            else dateEl.innerText = `${now.getMonth()+1}月 戰報`;

            logs.forEach((l, i) => {
                const ld = new Date(l.date); let inR = false;
                if(currentMode==='day') inR = ld.toDateString()===now.toDateString();
                else if(currentMode==='week') { inR = ld >= thisMonday; } // 切換到週報也是嚴格週一到週日
                else inR = ld.getMonth()===now.getMonth() && ld.getFullYear()===now.getFullYear();

                if(inR) { t += l.p; if(l.p>0){win++;g++;}else if(l.p<0)g++; }
                tbody.innerHTML += `<tr><td>${ld.getMonth()+1}/${ld.getDate()}</td><td>${l.n}</td><td class="${l.p>0?'win':(l.p<0?'lose':'')}">${l.p>0?'勝':(l.p<0?'負':'走')}</td><td class="${l.p>0?'win':(l.p<0?'lose':'')}">${l.p>0?'+'+l.p:l.p}</td><td><button class="del-btn" onclick="del(${i})">×</button></td></tr>`;
            });
            
            document.getElementById('total').innerText = t.toFixed(1);
            document.getElementById('winCount').innerText = win;
            document.getElementById('winRate').innerText = g>0?Math.round((win/g)*100)+'%':'0%';
            
            localStorage.setItem('nba_god_mode', JSON.stringify(logs));
        }

        function save() {
            const n = document.getElementById('name').value; const p = parseFloat(document.getElementById('res').value);
            if(!n) return; logs.unshift({n, p, date: new Date().toISOString()}); render(); document.getElementById('name').value='';
        }
        function del(i) { if(confirm('刪除這筆？')){logs.splice(i,1); render();} }
        function importData() {
            const r = prompt("貼上代碼：");
            if(r){ try{ const d=JSON.parse(r).map(x=>({...x, date:new Date().toISOString()})); logs=d.concat(logs); render(); }catch(e){alert("格式錯誤");} }
        }
        function exportData() {
            const str = JSON.stringify(logs);
            prompt("請複製下方全部代碼，並貼到手機備忘錄保存：", str);
        }
        render();
        if(baseMoney === 0) setBase(); // 初次進入要求設定本金
    </script>
</body>
</html>
