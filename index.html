<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>傑瑞號：368 鄉鎮全征服</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    :root { --neon-blue: #00f2ff; --neon-pink: #ff007f; --dark-bg: #0d1117; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: #e6edf3; display: flex; height: 100vh; overflow: hidden; }
    
    /* 左側進度面板 */
    #sidebar { width: 350px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; z-index: 1000; }
    .header-info { padding: 20px; background: linear-gradient(135deg, #1f6feb, #0d1117); }
    .total-stats { font-size: 24px; font-weight: bold; color: var(--neon-blue); }
    
    .scroll-area { flex-grow: 1; overflow-y: auto; padding: 10px; }
    .county-group { margin-bottom: 20px; background: #0d1117; border-radius: 8px; padding: 10px; }
    .county-title { font-weight: bold; color: var(--neon-pink); display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
    .town-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .town-tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: #21262d; border: 1px solid #30363d; cursor: pointer; transition: 0.2s; }
    .town-tag.visited { background: var(--neon-blue); color: black; border-color: var(--neon-blue); font-weight: bold; box-shadow: 0 0 5px var(--neon-blue); }
    
    /* 右側地圖 */
    #map { flex-grow: 1; background: #000 !important; }

    /* 等級與獎章彈窗 */
    .medal-popup { position: fixed; top: 20px; right: 20px; background: rgba(0,242,255,0.9); color: black; padding: 15px; border-radius: 10px; font-weight: bold; z-index: 2000; display: none; animation: slideIn 0.5s forwards; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
</style>
</head>
<body>

<div id="sidebar">
    <div class="header-info">
        <div style="font-size: 12px; opacity: 0.8;">JERRY'S EXPEDITION</div>
        <div class="total-stats" id="totalProgress">0 / 368</div>
        <div style="font-size: 14px; margin-top: 5px;">冒險等級：<span id="rankName">初級探險家</span></div>
    </div>
    <div class="scroll-area" id="countyList">
        </div>
</div>

<div id="map"></div>
<div id="medal" class="medal-popup">🎖️ 達成：新竹領主 (新竹縣制霸)！</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. 台灣 368 鄉鎮資料庫結構 (範例，我列出核心區域，你可以按此格式補齊)
    const taiwanData = {
        "新竹縣": ["竹北市", "竹東鎮", "新埔鎮", "關西鎮", "湖口鄉", "新豐鄉", "芎林鄉", "橫山鄉", "北埔鄉", "寶山鄉", "峨眉鄉", "尖石鄉", "五峰鄉"],
        "新竹市": ["東區", "北區", "香山區"],
        "台北市": ["中正區", "萬華區", "大同區", "中山區", "松山區", "大安區", "信義區", "內湖區", "南港區", "士林區", "北投區", "文山區"],
        "新北市": ["板橋區", "三重區", "中和區", "永和區", "新莊區", "新店區", "樹林區", "鶯歌區", "三峽區", "淡水區", "汐止區", "瑞芳區", "土城區", "蘆洲區", "五股區", "泰山區", "林口區", "深坑區", "石碇區", "坪林區", "三芝區", "石門區", "八里區", "平溪區", "雙溪區", "貢寮區", "金山區", "萬里區", "烏來區"],
        "桃園市": ["桃園區", "中壢區", "大溪區", "楊梅區", "蘆竹區", "大園區", "龜山區", "八德區", "龍潭區", "平鎮區", "新屋區", "觀音區", "復興區"],
        "台中市": ["中區", "東區", "南區", "西區", "北區", "北屯區", "西屯區", "南屯區", "太平區", "大里區", "霧峰區", "烏日區", "豐原區", "后里區", "石岡區", "東勢區", "和平區", "新社區", "潭子區", "大雅區", "神岡區", "大肚區", "沙鹿區", "龍井區", "梧棲區", "清水區", "大甲區", "外埔區", "大安區"]
        // ... 其他縣市可依此類推增加
    };

    // 2. 初始化
    const map = L.map('map', { zoomControl: false }).setView([24.82, 121.01], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let visited = JSON.parse(localStorage.getItem('tw368_save')) || [];

    function updateUI() {
        const total = visited.length;
        document.getElementById('totalProgress').innerText = `${total} / 368`;
        
        // 更新稱號
        let rank = "初級探險家";
        if(total > 10) rank = "資深旅行者";
        if(total > 50) rank = "全台開路先鋒";
        if(total > 150) rank = "荒野傳奇";
        if(total >= 368) rank = "台灣土地公 (真．制霸)";
        document.getElementById('rankName').innerText = rank;

        renderSidebar();
        localStorage.setItem('tw368_save', JSON.stringify(visited));
    }

    function renderSidebar() {
        const container = document.getElementById('countyList');
        container.innerHTML = '';

        for (const [county, towns] of Object.entries(taiwanData)) {
            const countyVisited = towns.filter(t => visited.includes(`${county}-${t}`));
            const isMastered = countyVisited.length === towns.length;

            const group = document.createElement('div');
            group.className = 'county-group';
            group.innerHTML = `
                <div class="county-title">
                    <span>${county}</span>
                    <span style="color:${isMastered ? 'var(--neon-blue)' : '#666'}">${countyVisited.length}/${towns.length}</span>
                </div>
                <div class="town-tags">
                    ${towns.map(t => {
                        const isDone = visited.includes(`${county}-${t}`);
                        return `<div class="town-tag ${isDone ? 'visited' : ''}" onclick="toggleTown('${county}', '${t}')">${t}</div>`;
                    }).join('')}
                </div>
            `;
            container.appendChild(group);
        }
    }

    window.toggleTown = function(county, town) {
        const id = `${county}-${town}`;
        if (visited.includes(id)) {
            visited = visited.filter(item => item !== id);
        } else {
            visited.push(id);
            checkMedal(county);
        }
        updateUI();
    };

    function checkMedal(county) {
        const towns = taiwanData[county];
        const countyVisited = towns.filter(t => visited.includes(`${county}-${t}`));
        if (countyVisited.length === towns.length) {
            const m = document.getElementById('medal');
            m.innerText = `🎖️ 達成：${county}制霸！`;
            m.style.display = 'block';
            setTimeout(() => { m.style.display = 'none'; }, 4000);
        }
    }

    // 點擊地圖打卡 (模擬)
    map.on('click', function(e) {
        const name = prompt("要在這裡手動標記一個點嗎？(請輸入名稱)");
        if(name) {
            L.circleMarker(e.latlng, { radius: 8, color: var(--neon-blue) }).addTo(map).bindPopup(name).openPopup();
        }
    });

    updateUI();
</script>
</body>
</html>
