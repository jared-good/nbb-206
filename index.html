<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣探索冒險</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root { --gold: #f1c40f; --gray: #95a5a6; --green: #2ecc71; }
  body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #2c3e50; }
  
  /* 頂部進度條 */
  .header { background: #1a1a1a; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
  .xp-container { flex-grow: 1; height: 12px; background: #444; border-radius: 6px; overflow: hidden; }
  .xp-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.5s; }
  
  #map { flex-grow: 1; }

  /* 下方任務列表 */
  .quest-panel { background: white; height: 200px; overflow-y: auto; padding: 10px; }
  .quest-card { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; gap: 10px; }
  .quest-card.done { background: #f0fff4; opacity: 0.7; }
  .quest-info { flex-grow: 1; }
  .quest-name { font-weight: bold; font-size: 14px; }
  .quest-dist { font-size: 12px; color: #666; }
  .btn-go { background: var(--gold); border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
  .btn-done { background: var(--green); color: white; border: none; padding: 5px 10px; border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <div id="lvDisplay" style="font-weight: bold; color: var(--gold);">LV.1</div>
  <div class="xp-container"><div class="xp-fill" id="xpBar"></div></div>
  <div id="scoreDisplay">0 / 100 XP</div>
</div>

<div id="map"></div>

<div class="quest-panel" id="questPanel">
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
