<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣鄉鎮攻略</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
  #map { flex-grow: 1; }
  .menu { background: #333; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
  .stats { font-size: 14px; }
  .spot-btn { background: #007AFF; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-right: 5px; font-size: 12px; }
  .reset-btn { background: #ff3b30; font-size: 10px; border: none; color: white; padding: 3px 8px; border-radius: 3px; }
</style>
</head>
<body>

<div class="menu">
  <div><b>🇹🇼 台灣攻略</b> <span class="stats" id="status">已解鎖: 0</span></div>
  <button class="reset-btn" onclick="clearData()">重設</button>
</div>

<div id="map"></div>

<div style="padding: 10px; background: #eee; overflow-x: auto; white-space: nowrap;">
  <span style="font-size: 12px; font-weight: bold;">快捷打卡：</span>
  <button class="spot-btn" onclick="checkIn('竹北市', 24.811, 121.029, '新瓦屋')">竹北新瓦屋</button>
  <button class="spot-btn" onclick="checkIn('新竹市', 24.802, 120.965, '城隍廟')">新竹城隍廟</button>
  <button class="spot-btn" onclick="checkIn('淡水區', 25.182, 121.411, '漁人碼頭')">淡水碼頭</button>
  <button class="spot-btn" onclick="checkIn('恆春鎮', 21.946, 120.796, '墾丁大街')">墾丁</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // 1. 初始化地圖 (預設新竹)
  const map = L.map('map').setView([24.82, 121.01], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  // 2. 讀取資料
  let visited = JSON.parse(localStorage.getItem('tw_checkins')) || {};

  function updateUI() {
    const count = Object.keys(visited).length;
    document.getElementById('status').innerText = `已解鎖: ${count} 鄉鎮區`;
    localStorage.setItem('tw_checkins', JSON.stringify(visited));
  }

  // 3. 打卡功能
  function checkIn(areaName, lat, lng, spotName) {
    if (!visited[areaName]) {
      visited[areaName] = { lat, lng, spot: spotName };
      L.marker([lat, lng]).addTo(map).bindPopup(`<b>${areaName}</b><br>${spotName}`).openPopup();
      map.flyTo([lat, lng], 13);
      updateUI();
    } else {
      alert('這個區你已經去過囉！');
    }
  }

  // 4. 點擊地圖任意處打卡
  map.on('click', function(e) {
    const { lat, lng } = e.latlng;
    const customName = prompt('發現新地點！請輸入鄉鎮或景點名稱:');
    if (customName) {
      checkIn(customName, lat, lng, '手動標記');
    }
  });

  // 5. 載入舊有標記
  Object.keys(visited).forEach(key => {
    const item = visited[key];
    L.marker([item.lat, item.lng]).addTo(map).bindPopup(`<b>${key}</b><br>${item.spot}`);
  });

  function clearData() {
    if(confirm('確定清除紀錄？')) {
      localStorage.removeItem('tw_checkins');
      location.reload();
    }
  }

  updateUI();
</script>
</body>
</html>
