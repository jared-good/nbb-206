<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NBA 終極上帝模式 - 霹靂版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #000; color: #fff; padding: 10px; margin: 0; transition: border 0.3s; border: 2px solid #000; min-height: 100vh; box-sizing: border-box; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; position: relative; overflow: hidden; }
        .card-gold { border: 1px solid #f39c12; box-shadow: 0 0 10px rgba(243,156,18,0.2); }
        .celebrate-200 { border-color: #e74c3c; box-shadow: 0 0 20px rgba(231,76,60,0.6); }
        .celebrate-300 { animation: rainbow 0.5s infinite; }
        @keyframes rainbow { 0%{border-color:#f39c12;} 33%{border-color:#2ecc71;} 66%{border-color:#e74c3c;} 100%{border-color:#f39c12; box-shadow:0 0 30px #f39c12;} }
        .shake-hard { animation: shake 0.3s infinite; }
        @keyframes shake { 0%{transform:translate(2px,1px) rotate(0deg);} 10%{transform:translate(-1px,-2px) rotate(-1deg);} 100%{transform:translate(1px,-2px) rotate(-1deg);} }
        h2 { color: #f39c12; margin: 0 0 10px 0; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
        .bankroll { font-size: 26px; font-weight: bold; color: #2ecc71; text-align: center; margin: 5px 0; text-shadow: 0 0 10px rgba(46,204,113,0.3); }
        .report-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab { flex: 1; padding: 10px; background: #262626; border-radius: 6px; text-align: center; font-size: 13px; color: #888; cursor: pointer; border: 1px solid #333; }
        .tab.active { background: #f39c12; color: #000; font-weight: bold; border: none; }
        .unit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .u-tab { padding: 12px 0; background: #262626; border-radius: 5px; text-align: center; font-size: 14px; color: #888; cursor: pointer; border: 1px solid #333; }
        .u-tab.active { background: #f39c12; color: #000; font-weight: bold; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; text-align: center; }
        .stat-box { background: #222; padding: 8px; border-radius: 8px; border: 1px solid #333; }
        .stat-label { font-size: 11px; color: #888; }
        .stat-num { font-size: 17px; font-weight: bold; color: #f39c12; }
        .progress-bg { background: #333; border-radius: 8px; height: 16px; overflow: hidden; margin-top: 8px; border: 1px solid #444; position: relative; }
        .progress-fill { background: linear-gradient(90deg, #f39c12, #f1c40f); height: 100%; width: 0%; transition: 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 11px; line-height: 16px; font-weight: bold; color: #fff; z-index: 2; text-shadow: 1px 1px 3px #000; }
        input, select, button { width: 100%; padding: 14px; margin-top: 8px; border-radius: 6px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: #262626; color: #fff; border: 1px solid #444; }
        button { background: #f39c12; color: #000; font-weight: bold; cursor: pointer; }
        table { width: 100%; margin-top: 12px; border-collapse: collapse; font-size: 12px; }
        td { padding: 10px 4px; border-bottom: 1px solid #222; text-align: center; }
        .win { color: #2ecc71; } .lose { color: #e74c3c; }
        .del-btn { color: #555; background: none; border: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>💰 真實資金庫 <button onclick="setBase()" style="width:auto;padding:4px 8px;font-size:10px;margin:0;background:#444;color:#fff;">設定</button></h2>
        <div class="bankroll" id="bankrollDisplay">0.0 u</div>
    </div>

    <div class="card card-gold" id="goalCard">
        <h2 id="goalHeader">🎯 本週 300u 目標進度</h2>
        <div class="progress-bg">
            <div class="progress-text" id="weekProgressText">0 / 300u</div>
            <div class="progress-fill" id="weekBar"></div>
        </div>
    </div>

    <div class="card">
        <div class="report-tabs">
            <div class="tab active" onclick="setMode('day', this)">日報</div>
            <div class="tab" onclick="setMode('week', this)">週報</div>
        </div>
        <div class="stat-grid">
            <div class="stat-box"><div class="stat-label">勝場</div><div id="winCount" class="stat-num">0</div></div>
            <div class="stat-box"><div class="stat-label">勝率</div><div id="winRate" class="stat-num">0%</div></div>
            <div class="stat-box"><div class="stat-label">累積損益</div><div id="total" class="stat-num">0</div></div>
        </div>
    </div>

    <div class="card">
        <h2>✍️ 操盤記錄</h2>
        <div class="unit-grid" id="unitGrid">
            </div>
        <input type="text" id="name" placeholder="賽事名稱 (如: 湖人讓分)">
        <select id="odds" onchange="updateWinProfit()">
            <option value="1.85">賠率 1.85</option>
            <option value="1.95" selected>賠率 1.95</option>
            <option value="2.05">賠率 2.05</option>
        </select>
        <select id="res">
            <option id="opt-win" value="0">勝 (+0u)</option>
            <option id="opt-lose" value="0">負 (-0u)</option>
            <option value="0">走 (0u)</option>
        </select>
        <button onclick="save()">💾 保存結果</button>
    </div>

    <div class="card">
        <table>
            <thead><tr><th>賽事</th><th>結果</th><th>損益</th><th></th></tr></thead>
            <tbody id="list"></tbody>
        </table>
        <button onclick="if(confirm('全部重置？')){localStorage.clear();location.reload();}" style="background:transparent;color:#555;font-size:10px;margin-top:15px;">🗑️ 重置所有數據</button>
    </div>

    <script>
        let logs = JSON.parse(localStorage.getItem('nba_god_v7')) || [];
        let baseMoney = parseFloat(localStorage.getItem('nba_base_v7')) || 0;
        let currentMode = 'day', currentUnit = 20;

        function initUnits() {
            const grid = document.getElementById('unitGrid');
            for(let u=20; u<=100; u+=10) {
                let div = document.createElement('div');
                div.className = `u-tab ${u===20?'active':''}`;
                div.innerText = u;
                div.onclick = () => setUnit(u, div);
                grid.appendChild(div);
            }
            updateWinProfit();
        }

        function setBase() {
            let m = prompt("輸入初始本金:", baseMoney);
            if(m !== null && !isNaN(m)) { baseMoney = parseFloat(m); localStorage.setItem('nba_base_v7', baseMoney); render(); }
        }

        function setUnit(u, el) {
            currentUnit = u;
            document.querySelectorAll('.u-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            updateWinProfit();
        }

        function updateWinProfit() {
            const odds = parseFloat(document.getElementById('odds').value);
            const winP = (currentUnit * (odds - 1)).toFixed(1);
            document.getElementById('opt-win').value = winP;
            document.getElementById('opt-win').innerText = `勝 (+${winP}u)`;
            document.getElementById('opt-lose').value = -currentUnit;
            document.getElementById('opt-lose').innerText = `負 (-${currentUnit}u)`;
        }

        function getMonday(d) { d = new Date(d); var day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6:1); return new Date(d.setDate(diff)).setHours(0,0,0,0); }
        function setMode(mode, el) { currentMode = mode; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); render(); }

        function fx300() {
            document.body.classList.add('shake-hard');
            var duration = 5000; var animationEnd = Date.now() + duration;
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { clearInterval(interval); document.body.classList.remove('shake-hard'); return; }
                confetti({ particleCount: 50, spread: 100, origin: {y: 0.6}, colors: ['#FFD700', '#fff']});
            }, 250);
        }

        function render() {
            let t = 0, win = 0, g = 0, allP = 0, weekP = 0; 
            const now = new Date(), mon = getMonday(now);
            const tbody = document.getElementById('list');
            tbody.innerHTML = '';

            logs.forEach(l => {
                allP += l.p;
                if(new Date(l.date) >= mon) weekP += l.p;
            });

            if(weekP >= 300) { fx300(); document.getElementById('goalCard').classList.add('celebrate-300'); }

            document.getElementById('bankrollDisplay').innerText = (baseMoney + allP).toFixed(1) + ' u';
            document.getElementById('weekProgressText').innerText = weekP.toFixed(1) + ' / 300u';
            document.getElementById('weekBar').style.width = Math.min(Math.max(0, (weekP/300)*100), 100) + '%';
            
            logs.forEach((l, i) => {
                const ld = new Date(l.date); let inR = false;
                if(currentMode==='day') inR = ld.toDateString()===now.toDateString();
                else inR = ld >= mon;
                
                if(inR) {
                    t += l.p; if(l.p > 0) { win++; g++; } else if(l.p < 0) g++;
                    tbody.innerHTML += `<tr><td>${l.n}</td><td class="${l.p>0?'win':(l.p<0?'lose':'')}">${l.p>0?'勝':(l.p<0?'負':'走')}</td><td class="${l.p>0?'win':(l.p<0?'lose':'')}">${l.p>0?'+'+l.p:l.p}</td><td><button class="del-btn" onclick="del(${i})">×</button></td></tr>`;
                }
            });
            document.getElementById('total').innerText = t.toFixed(1);
            document.getElementById('winCount').innerText = win;
            document.getElementById('winRate').innerText = g > 0 ? Math.round((win/g)*100) + '%' : '0%';
            localStorage.setItem('nba_god_v7', JSON.stringify(logs));
        }

        function save() { 
            const n = document.getElementById('name').value; 
            const p = parseFloat(document.getElementById('res').value); 
            if(!n) return; 
            logs.unshift({n, p, date: new Date().toISOString()}); 
            render(); 
            document.getElementById('name').value=''; 
        }
        function del(i) { if(confirm('刪除？')){logs.splice(i,1); render();} }
        
        initUnits();
        render();
        if(baseMoney === 0) setBase();
    </script>
</body>
</html>
